<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pardot form CSS test</title>
  <link rel="stylesheet" href="pardot-form.css">
  <style>html { background: #eceef2; padding: 24px; }</style>
</head>
<body>
  <form class="form" action="#" method="post">
    <p class="form-field email text required">
      <input type="email" class="text" value="kevinnajanurdin@gmail.com">
    </p>
    <p class="form-field first_name text required">
      <input type="text" class="text" value="Kevin">
    </p>
    <p class="form-field last_name text required">
      <input type="text" class="text" value="Najanurdin">
    </p>
    <p class="form-field phone text">
      <input type="tel" class="text" value="0481948248">
    </p>
    <p class="form-field select">
      <select class="select"><option selected>Individual Investor</option></select>
    </p>
    <p class="form-field select">
      <select class="select"><option selected>New South Wales</option></select>
    </p>
    <p class="submit"><input type="submit" value="Submit"></p>
  </form>
</body>
</html>
