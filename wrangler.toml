# Cloudflare Workers (Static Assets) config for the Ziller site.
# Static files in this repo are served as assets; the Worker (_worker.js) handles
# the /api/* routes. The function logic lives in functions/api/*.js.
#
# `name` MUST match the Worker created in the dashboard (shown in the build log
# as "Uploaded my-website").

name = "my-website"
main = "_worker.js"
compatibility_date = "2026-01-01"

[assets]
directory = "."
binding = "ASSETS"

# Non-secret, overridable tunables (safe to commit). Values arrive as strings.
[vars]
ICE_BASE_URL = "https://inav.ice.com"
ICE_TOKEN_CACHE_SECONDS = "7200"
INAV_CACHE_SECONDS = "60"
NAV_LOOKBACK_DAYS = "30"
NAV_HISTORY_LIMIT = "30"
NAV_CACHE_SECONDS = "3600"
NAV_MAX_FILES = "20"
ALLOW_ORIGIN = "*"

# SECRETS — DO NOT put these here (this file is committed to a public repo).
# Set them encrypted in the Cloudflare dashboard:
#   Workers & Pages -> my-website -> Settings -> Variables and Secrets -> add as "Secret"
# or via the CLI:
#   npx wrangler secret put ICE_USERNAME
#   npx wrangler secret put ICE_PASSWORD
#   npx wrangler secret put PERENNIAL_FEED_BASE
#   npx wrangler secret put MPI_FEED_BASE
#
# For local dev (`npx wrangler dev`) put the same keys in a .dev.vars file
# (gitignored) — copy .dev.vars.example as a starting point.

# --- Historical NAV accumulator (Option B) -----------------------------------
# KV namespace "ziller-nav". The daily cron seeds the KV CSV once (from the existing
# WordPress file) and appends a row each day thereafter; served by /api/nav?format=csv.
[triggers]
crons = ["0 8 * * *"]   # daily 08:00 UTC (~6pm Sydney); merge is idempotent, time isn't critical

[[kv_namespaces]]
binding = "NAV_KV"
id = "1fccb1eef41e4f14923f983b39d16eea"
